# 服务端部署工作流

name: Deploy Server

on:
  push:
    branches:
      - main
    paths:
      - 'packages/server/**'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: 构建服务端
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: 缓存 Rust 依赖
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/server

      - name: 构建服务端
        run: |
          cd packages/server
          cargo build --release

      - name: 构建 Docker 镜像
        run: |
          docker build -t nextest-server:latest packages/server

      - name: 登录 Docker Hub
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 推送 Docker 镜像
        if: github.ref == 'refs/heads/main'
        run: |
          docker tag nextest-server:latest ${{ secrets.DOCKER_USERNAME }}/nextest-server:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/nextest-server:latest

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: NexTest-Server
          path: packages/server/target/release/nextest-server
          retention-days: 7

  deploy:
    name: 部署到服务器
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: 部署通知
        run: |
          echo "部署完成，请手动配置服务器拉取最新镜像"
          echo "docker pull ${{ secrets.DOCKER_USERNAME }}/nextest-server:latest"
          echo "docker-compose up -d"