# Windows 桌面端构建工作流
# 仅在 tag push 或手动触发时构建

name: Build Windows Desktop

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: 构建 Windows 便携版
    runs-on: windows-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: 缓存 Rust 依赖
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            packages/core
            packages/desktop/src-tauri
            packages/server

      - name: 安装前端依赖
        run: pnpm install

      - name: 构建 Tauri 应用（便携版）
        run: |
          cd packages/desktop
          pnpm tauri build --no-bundle
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: 调试 - 列出构建产物
        run: |
          Write-Host "=== 根目录 target/release ==="
          Get-ChildItem -Path "target/release" -Filter "*.exe" -ErrorAction SilentlyContinue
          Write-Host "=== packages/desktop/src-tauri/target/release ==="
          Get-ChildItem -Path "packages/desktop/src-tauri/target/release" -Filter "*.exe" -ErrorAction SilentlyContinue
          Write-Host "=== 搜索所有 exe 文件 ==="
          Get-ChildItem -Path "." -Filter "*.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object FullName
        shell: pwsh

      - name: 重命名便携版可执行文件
        run: |
          $version = $env:GITHUB_REF_NAME -replace 'v', ''
          if ($version -eq 'main' -or $version -eq 'develop') {
            $version = '0.1.0-dev'
          }
          $exePath = ""
          if (Test-Path "target/release/NexTest.exe") {
            $exePath = "target/release/NexTest.exe"
          } elseif (Test-Path "packages/desktop/src-tauri/target/release/NexTest.exe") {
            $exePath = "packages/desktop/src-tauri/target/release/NexTest.exe"
          } elseif (Test-Path "target/release/nextest-desktop.exe") {
            $exePath = "target/release/nextest-desktop.exe"
          } elseif (Test-Path "packages/desktop/src-tauri/target/release/nextest-desktop.exe") {
            $exePath = "packages/desktop/src-tauri/target/release/nextest-desktop.exe"
          }
          if ($exePath) {
            Move-Item -Path $exePath -Destination "NexTest-${version}-Portable.exe"
            Write-Host "Successfully created: NexTest-${version}-Portable.exe"
          } else {
            Write-Error "Could not find exe file"
            exit 1
          }
        shell: pwsh

      - name: 测试运行 exe
        run: |
          $exeFile = Get-ChildItem -Path "." -Filter "NexTest-*-Portable.exe" | Select-Object -First 1
          if (-not $exeFile) {
            Write-Error "找不到 exe 文件"
            exit 1
          }
          Write-Host "测试运行: $($exeFile.FullName)"
          
          # 启动 exe，等待初始化
          $process = Start-Process -FilePath $exeFile.FullName -PassThru -WindowStyle Hidden
          Write-Host "进程已启动，PID: $($process.Id)，等待初始化..."
          Start-Sleep -Seconds 8
          
          # 收集所有日志
          $logFiles = @("nextest-debug.log", "nextest-startup.log", "nextest-crash.log")
          $hasError = $false
          $errorMsg = ""
          
          Write-Host "`n========== 日志分析 =========="
          
          # 检查 startup 日志
          if (Test-Path "nextest-startup.log") {
            Write-Host "`n--- nextest-startup.log ---"
            $startupLog = Get-Content "nextest-startup.log" -Raw
            Write-Host $startupLog
          } else {
            Write-Host "警告: 未找到 nextest-startup.log"
            $hasError = $true
            $errorMsg = "启动日志未生成"
          }
          
          # 检查 debug 日志
          if (Test-Path "nextest-debug.log") {
            Write-Host "`n--- nextest-debug.log ---"
            $debugLog = Get-Content "nextest-debug.log" -Raw
            Write-Host $debugLog
            
            # 分析错误
            if ($debugLog -match "ERROR|error|failed|Failed|FAILED") {
              $hasError = $true
              $errorMsg = "发现错误日志"
            }
            if ($debugLog -match "Tauri 运行失败") {
              $hasError = $true
              $errorMsg = "Tauri 运行失败"
            }
          } else {
            Write-Host "警告: 未找到 nextest-debug.log"
          }
          
          # 检查 crash 日志
          if (Test-Path "nextest-crash.log") {
            Write-Host "`n--- nextest-crash.log (崩溃日志!) ---"
            $crashLog = Get-Content "nextest-crash.log" -Raw
            Write-Host $crashLog
            $hasError = $true
            $errorMsg = "程序崩溃"
          }
          
          Write-Host "`n========== 测试结果 =========="
          
          # 检查进程状态
          $process.Refresh()
          if ($process.HasExited) {
            Write-Host "进程已退出，退出码: $($process.ExitCode)"
            if ($process.ExitCode -ne 0) {
              $hasError = $true
              $errorMsg = "异常退出码: $($process.ExitCode)"
            }
          } else {
            Write-Host "进程仍在运行，PID: $($process.Id)"
            Stop-Process -Id $process.Id -Force
          }
          
          if ($hasError) {
            Write-Error "测试失败: $errorMsg"
            exit 1
          } else {
            Write-Host "测试通过！程序正常启动"
          }
        shell: pwsh

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: NexTest-Windows-Portable
          path: NexTest-*-Portable.exe
          retention-days: 30

  release:
    name: 发布版本
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    
    steps:
      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: NexTest-Windows-Portable
          path: artifacts

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.exe
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}