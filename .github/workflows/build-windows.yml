# Windows 桌面端构建工作流
# 使用 Windows 原生 runner 构建，避免跨平台编译兼容性问题

name: Build Windows Desktop

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: 构建 Windows 便携版
    runs-on: windows-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: 缓存 Rust 依赖
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            packages/core
            packages/desktop/src-tauri
            packages/server

      - name: 安装前端依赖
        run: pnpm install

      - name: 构建前端
        run: pnpm --filter @nextest/desktop build

      - name: 构建 Tauri 应用（便携版）
        run: |
          cd packages/desktop
          pnpm tauri build --bundles none
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: 重命名便携版可执行文件
        run: |
          $version = $env:GITHUB_REF_NAME -replace 'v', ''
          if ($version -eq 'main' -or $version -eq 'develop') {
            $version = '0.1.0-dev'
          }
          Move-Item -Path "packages/desktop/src-tauri/target/release/NexTest.exe" -Destination "packages/desktop/src-tauri/target/release/NexTest-${version}-Portable.exe"
        shell: pwsh

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: NexTest-Windows-Portable
          path: packages/desktop/src-tauri/target/release/NexTest-*-Portable.exe
          retention-days: 30

  release:
    name: 发布版本
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: NexTest-Windows-Portable
          path: artifacts

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.exe
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}